    <div class="page">
      <form class="feedback-form">
        <h2>Feedback</h2>
        
        <label for="name" class="labels">Name</label>
        <input type="text" id="name" name="name" required class="inputs">
    
        <label for="email" class="labels">Email</label>
        <input type="email" id="email" name="email" required class="inputs">
    
        <div class="options">
            <input type="radio" id="comment" name="type" value="comment" class="inputs">
            <label for="comment" class="labels">Comment on feedback</label><br>
    
            <input type="radio" id="feature" name="type" value="feature" class="inputs">
            <label for="feature" class="labels">Feature recommendation</label>
        </div>
    
        <label for="feedback" class="labels">Feedback</label>
        <textarea id="feedback" name="feedback" rows="4" required class="inputs"></textarea>
    
        <button type="submit">Submit</button>
    
    </form>
    </div>
