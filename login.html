<!DOCTYPE html>
<html>
<head>
  <title>Slide Navbar</title>
  <link rel="stylesheet" type="text/css" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
  
</head>

<body>
  <div class="main">
    <input type="checkbox" id="chk" aria-hidden="true">
  
    
    <div class="signup">
      <form>
        <label for="chk" aria-hidden="true">Login</label>
        <input id="email" type="email" name="email" placeholder="Email" required="">
        <input id="password" type="password" name="pswd" placeholder="Password" required="">
        <button id="loginBtn">Login</button>
      </form>
    </div>
  
    
    <div class="login">
      <form>
        <label for="chk" aria-hidden="true">Sign up</label>
        <input type="text" name="txt" placeholder="first name" required="">
        <input type="text" name="txt" placeholder="surname" required="">
        <input id="email1" type="email" name="email" placeholder="example@gmail.com" required="">
        <input type="text" name="txt" placeholder="username" required="">
        <input id="password1" type="password" name="pswd" placeholder="Password" required="">
        <button id="registerBtn">Sign up</button>
      </form>
    </div>
  </div>
  <script src="localsign.js"></script>
