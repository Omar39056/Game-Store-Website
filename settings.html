  <section class="settings">
    <h2>SETTINGS</h2>
    <div class="settings-box">
      <a href="profile.html"><button class="profile-btn">Go to my profile</button></a>
      <div class="form-group">
        <label for="language" class="morsy">Language</label>


        <select id="language" onchange="switchtoen()">
          <option disabled selected>Enter language</option>
          <option value="english" onclick="">English</option>
          <option value="arabic" onclick="">Arabic</option>
        </select>
      </div>

      <div class="form-group">
        <label for="profile-visibility" class="morsy">Profile Visibility *</label>
        <select id="profile-visibility">
          <option disabled selected>Enter your visibility</option>
          <option value="public">Public</option>
          <option value="private">Private</option>
          <option value="friends-only">Friends Only</option>
        </select>
      </div>

      <div class="form-group">
        <label for="game-history-visibility" class="morsy">Game History Visibility *</label>
        <select id="game-history-visibility" >
          <option disabled selected>Enter visibility</option>
          <option value="everyone">Everyone</option>
          <option value="only-me">Only Me</option>
          <option value="friends">Friends</option>
        </select>
      </div>
      <a href="login.html"><button class="logout-btn">Log out</button></a>
      <button style="margin-left: 205px;" id="themeToggle" onclick="switchTheme()" class="theme-button">
      Switch to Dark Mode
    </button>
    </div>
    
  </section>
