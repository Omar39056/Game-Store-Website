<!DOCTYPE html>
<html>
<head>
  <title>Slide Navbar</title>
  <link rel="stylesheet" type="text/css" href="signup.css">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
  <script src="localsign.js"></script>
</head>


<body>
  <div class="main" id="container">
    <input type="checkbox" id="chk" aria-hidden="true">

    <div class="signup">
        <form>
          <label for="chk" aria-hidden="true">Sign up</label>
          
          <input type="text" name="txt" placeholder="first name" required="">
          <input type="text" name="txt" placeholder="surname" required="">
          <input type="email" name="email" placeholder="example@gmail.com" required="">
          <input type="text" name="txt" placeholder="username" required="">
          <input type="password" name="pswd" placeholder="Password" required="">
          <button>Sign up</button>
        </form>
      </div>
  
      <div class="login">
        <form>
          <label for="chk" aria-hidden="true">Login</label>
          <input type="email" name="email" placeholder="Email" required="">
          <input type="password" name="pswd" placeholder="Password" required="">
          <button>Login</button>
        </form>
        <p id="message"></p>
      </div>
      <div class="create-account">
          <P>Dont have an account? <a href="signup.html">cREATE ONE</a></P>
          <P><a href="home.html">Continue as a visitor</a></P>
      </div>
    
  
  <script src="localsign.js"></script>
